<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tissu Volant - Arcade 2D</title>
  <link rel="stylesheet" href="Style/style.css">
</head>
<body>
  <canvas id="gameCanvas" aria-label="Jeu de tissu volant"></canvas>

  <div class="hud">
    <div class="panel" id="distancePanel">Distance: <strong>0 m</strong></div>
    <div class="panel" id="statusPanel">Etat: <strong>Pret</strong></div>
  </div>

  <div class="center-overlay" id="overlay">
    <div class="message-card" id="messageCard">
      <h1>La traversée de Henriette</h1>
      <p>Aide Henriette a traverser le parc Steinbach ! </p>
      <p>Tap/clic ou <strong>Espace</strong>: impulsion vers le haut.<br>
      <strong>Fleches gauche/droite</strong> ou inclinaison mobile: controle horizontal.</p>
      <div class="btn-row">
        <button class="primary" id="startBtn">Lancer la partie</button>
        <button class="secondary" id="motionBtn">Activer gyroscope</button>
      </div>
      <p class="hint">Astuce: de petites touches regulieres donnent un meilleur controle.</p>
    </div>
  </div>

  <script src="Script/script.js"></script>
</body>
</html>
