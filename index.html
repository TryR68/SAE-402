<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tissu Volant - Arcade 2D</title>
  <style>
    :root {
      --sky-top: #7ed7ff;
      --sky-bottom: #ccf4ff;
      --grass: #65c961;
      --ground: #4a9e4a;
      --panel: rgba(20, 30, 45, 0.78);
      --text: #f4f8ff;
      --accent: #ffd447;
      --danger: #ff7f7f;
      --success: #96f59f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
      color: var(--text);
      touch-action: manipulation;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
      background: transparent;
    }

    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      z-index: 10;
      pointer-events: none;
    }

    .panel {
      background: var(--panel);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 8px 12px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(3px);
    }

    .panel strong {
      color: var(--accent);
    }

    .center-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 20;
      pointer-events: none;
      padding: 16px;
      text-align: center;
    }

    .message-card {
      max-width: 540px;
      background: rgba(11, 24, 37, 0.86);
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.28);
      padding: 18px 18px 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
    }

    .message-card h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
      line-height: 1.2;
    }

    .message-card p {
      margin: 8px 0;
      color: #d9ebff;
      line-height: 1.35;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary {
      background: linear-gradient(180deg, #ffdf70, #ffc93e);
      color: #332100;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #eff5ff;
    }

    .hidden {
      display: none;
    }

    .hint {
      color: #c7deff;
      font-size: 0.9rem;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Jeu de tissu volant"></canvas>

  <div class="hud">
    <div class="panel" id="distancePanel">Distance: <strong>0 m</strong></div>
    <div class="panel" id="statusPanel">Etat: <strong>Pret</strong></div>
  </div>

  <div class="center-overlay" id="overlay">
    <div class="message-card" id="messageCard">
      <h1>La traversée de Henriette</h1>
      <p>Aide Henriette a traverser le parc Steinbach ! </p>
      <p>Tap/clic ou <strong>Espace</strong>: impulsion vers le haut.<br>
      <strong>Fleches gauche/droite</strong> ou inclinaison mobile: controle horizontal.</p>
      <div class="btn-row">
        <button class="primary" id="startBtn">Lancer la partie</button>
        <button class="secondary" id="motionBtn">Activer gyroscope</button>
      </div>
      <p class="hint">Astuce: de petites touches regulieres donnent un meilleur controle.</p>
    </div>
  </div>

  <script>
    "use strict";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const messageCard = document.getElementById("messageCard");
    const startBtn = document.getElementById("startBtn");
    const motionBtn = document.getElementById("motionBtn");
    const distancePanel = document.getElementById("distancePanel");
    const statusPanel = document.getElementById("statusPanel");

    const config = {
      physics: {
        gravity: 980,
        flapImpulse: -340,
        maxFall: 520
      },
      world: {
        scrollSpeed: 190,
        pipeInterval: 1.35,
        pipeWidth: 82,
        minGap: 150,
        maxGap: 190
      },
      player: {
        xRatio: 0.27,
        startYRatio: 0.45,
        radius: 17
      }
    };

    const game = {
      mode: "menu", // menu | running | gameover
      score: 0,
      elapsed: 0
    };

    const world = {
      groundY: 0,
      pipeTimer: 0,
      pipes: [],
      particles: [],
      treesFar: [],
      flowers: []
    };

    const input = {
      flapQueued: false
    };

    const player = {
      x: 0,
      y: 0,
      vy: 0,
      radius: config.player.radius,
      flashTimer: 0,
      trail: []
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function rectCircleIntersect(rect, circle) {
      const nearestX = clamp(circle.x, rect.x, rect.x + rect.w);
      const nearestY = clamp(circle.y, rect.y, rect.y + rect.h);
      const dx = circle.x - nearestX;
      const dy = circle.y - nearestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      world.groundY = canvas.height * 0.86;
      player.x = canvas.width * config.player.xRatio;
    }
    window.addEventListener("resize", resizeCanvas);

    function seedBackground() {
      world.treesFar = [];
      world.flowers = [];
      for (let i = 0; i < 14; i++) {
        world.treesFar.push({
          x: (i / 14) * canvas.width,
          trunkH: rand(40, 80),
          crownR: rand(22, 34)
        });
      }
      for (let i = 0; i < 26; i++) {
        world.flowers.push({
          x: rand(0, canvas.width),
          y: rand(world.groundY + 8, canvas.height - 8),
          hue: Math.floor(rand(0, 360))
        });
      }
    }

    function spawnPipePair() {
      const gap = rand(config.world.minGap, config.world.maxGap);
      const safeTop = 70;
      const safeBottom = world.groundY - 70;
      const gapY = rand(safeTop + gap * 0.5, safeBottom - gap * 0.5);
      world.pipes.push({
        x: canvas.width + 40,
        w: config.world.pipeWidth,
        gapY,
        gapH: gap,
        scored: false
      });
    }

    function spawnTapParticles(px, py) {
      for (let i = 0; i < 9; i++) {
        world.particles.push({
          x: px,
          y: py,
          vx: rand(-55, 55),
          vy: rand(-20, 70),
          life: rand(0.16, 0.32),
          size: rand(2, 4),
          hue: rand(35, 65)
        });
      }
    }

    function updateParticles(dt) {
      for (const p of world.particles) {
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 160 * dt;
      }
      world.particles = world.particles.filter((p) => p.life > 0);
    }

    function queueFlap() {
      if (game.mode === "running") input.flapQueued = true;
    }

    canvas.addEventListener("pointerdown", () => {
      if (game.mode === "menu") {
        startRun();
      } else if (game.mode === "gameover") {
        resetGame();
        startRun();
      } else {
        queueFlap();
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        if (game.mode === "menu") {
          startRun();
        } else if (game.mode === "gameover") {
          resetGame();
          startRun();
        } else {
          queueFlap();
        }
      }
      if (e.code === "Enter" && game.mode === "gameover") {
        resetGame();
      }
    });

    async function requestMotionPermission() {
      if (typeof DeviceOrientationEvent === "undefined") {
        setStatus("Gyroscope indisponible");
        return;
      }
      try {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const response = await DeviceOrientationEvent.requestPermission();
          if (response !== "granted") {
            setStatus("Permission gyroscope refusee");
            return;
          }
        }
        setStatus("Gyroscope: tap pour flap");
      } catch (err) {
        setStatus("Erreur gyroscope");
        console.error(err);
      }
    }

    function resetGame() {
      game.mode = "menu";
      game.score = 0;
      game.elapsed = 0;
      world.pipeTimer = 0;
      world.pipes = [];
      world.particles = [];
      player.y = canvas.height * config.player.startYRatio;
      player.vy = 0;
      player.flashTimer = 0;
      player.trail = [];
      input.flapQueued = false;
      seedBackground();
      updateHud();
      setStatus("Pret");
      showMenuMessage();
    }

    function applyInput(dt) {
      if (!dt) return;
      if (input.flapQueued) {
        player.vy = config.physics.flapImpulse;
        player.flashTimer = 0.12;
        spawnTapParticles(player.x - 5, player.y + 6);
        input.flapQueued = false;
      }
    }

    function updatePlayer(dt) {
      player.vy += config.physics.gravity * dt;
      player.vy = clamp(player.vy, -600, config.physics.maxFall);
      player.y += player.vy * dt;

      if (player.flashTimer > 0) player.flashTimer -= dt;
      player.trail.push({ x: player.x, y: player.y, a: 1 });
      if (player.trail.length > 14) player.trail.shift();
      for (const t of player.trail) t.a *= 0.88;
    }

    function updateWorld(dt) {
      const speed = config.world.scrollSpeed;
      game.elapsed += dt;
      world.pipeTimer += dt;

      if (world.pipeTimer >= config.world.pipeInterval) {
        world.pipeTimer = 0;
        spawnPipePair();
      }

      for (const pipe of world.pipes) {
        pipe.x -= speed * dt;
        if (!pipe.scored && pipe.x + pipe.w < player.x) {
          pipe.scored = true;
          game.score += 1;
          spawnTapParticles(player.x + 2, player.y - 2);
        }
      }
      world.pipes = world.pipes.filter((p) => p.x + p.w > -20);

      for (const tree of world.treesFar) {
        tree.x -= speed * 0.3 * dt;
        if (tree.x < -60) tree.x = canvas.width + rand(20, 180);
      }
      for (const f of world.flowers) {
        f.x -= speed * dt;
        if (f.x < -8) f.x = canvas.width + rand(10, 80);
      }
    }

    function resolveCollisions() {
      const circle = { x: player.x, y: player.y, r: player.radius };

      if (player.y + player.radius >= world.groundY) {
        player.y = world.groundY - player.radius;
        gameOver("Le tissu touche le sol");
        return;
      }
      if (player.y - player.radius <= 0) {
        player.y = player.radius;
        gameOver("Le tissu touche le haut");
        return;
      }

      for (const pipe of world.pipes) {
        const topRect = { x: pipe.x, y: 0, w: pipe.w, h: pipe.gapY - pipe.gapH * 0.5 };
        const bottomRect = {
          x: pipe.x,
          y: pipe.gapY + pipe.gapH * 0.5,
          w: pipe.w,
          h: world.groundY - (pipe.gapY + pipe.gapH * 0.5)
        };
        if (rectCircleIntersect(topRect, circle) || rectCircleIntersect(bottomRect, circle)) {
          gameOver("Collision avec un obstacle");
          return;
        }
      }
    }

    function updateHud() {
      distancePanel.innerHTML = `Score: <strong>${game.score}</strong>`;
    }

    function setStatus(text) {
      statusPanel.innerHTML = `Etat: <strong>${text}</strong>`;
    }

    function showMenuMessage() {
      overlay.classList.remove("hidden");
      messageCard.innerHTML = `
        <h1>Tissu Volant - Mode Flappy</h1>
        <p>Passe entre les obstacles sans toucher le sol ni le plafond.</p>
        <p><strong>Tap/clic</strong> ou <strong>Espace/Fleche haut</strong> pour flap.</p>
        <div class="btn-row">
          <button class="primary" id="startBtn">Demarrer</button>
          <button class="secondary" id="motionBtn">Info gyroscope</button>
        </div>
        <p class="hint">Le score augmente a chaque paire de tuyaux depassee.</p>
      `;
      bindOverlayButtons();
    }

    function showEndMessage(title, subtitle) {
      overlay.classList.remove("hidden");
      messageCard.innerHTML = `
        <h1 style="color:var(--danger);">${title}</h1>
        <p>${subtitle}</p>
        <p>Score final: <strong>${game.score}</strong></p>
        <div class="btn-row">
          <button class="primary" id="startBtn">Rejouer</button>
          <button class="secondary" id="motionBtn">Info gyroscope</button>
        </div>
        <p class="hint">Tap ou Espace pour redemarrer rapidement.</p>
      `;
      bindOverlayButtons();
    }

    function bindOverlayButtons() {
      const start = document.getElementById("startBtn");
      const motion = document.getElementById("motionBtn");
      start.addEventListener("click", () => {
        if (game.mode === "menu" || game.mode === "gameover") {
          startRun();
        }
      });
      motion.addEventListener("click", requestMotionPermission);
    }

    function startRun() {
      if (game.mode === "gameover") {
        resetGame();
      }
      game.mode = "running";
      overlay.classList.add("hidden");
      setStatus("En vol");
      player.vy = -120;
      spawnTapParticles(player.x, player.y);
      if (world.pipes.length === 0) {
        spawnPipePair();
      }
    }

    function gameOver(reason) {
      if (game.mode !== "running") return;
      game.mode = "gameover";
      setStatus("Perdu");
      showEndMessage("Partie terminee", reason);
    }

    function drawCloud(x, y, scale) {
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(x - 25 * scale, y, 18 * scale, 0, Math.PI * 2);
      ctx.arc(x, y - 8 * scale, 24 * scale, 0, Math.PI * 2);
      ctx.arc(x + 25 * scale, y, 18 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#7ed7ff");
      sky.addColorStop(1, "#d6f6ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.globalAlpha = 0.45;
      drawCloud(120, 85, 1.1);
      drawCloud(canvas.width * 0.5, 66, 0.9);
      drawCloud(canvas.width - 160, 100, 1.25);
      ctx.globalAlpha = 1;

      for (const tree of world.treesFar) {
        const trunkTop = world.groundY - tree.trunkH;
        ctx.fillStyle = "#8f613b";
        ctx.fillRect(tree.x - 4, trunkTop, 8, tree.trunkH);
        ctx.fillStyle = "#58b95a";
        ctx.beginPath();
        ctx.arc(tree.x, trunkTop, tree.crownR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#65c961";
      ctx.fillRect(0, world.groundY, canvas.width, canvas.height - world.groundY);
      ctx.fillStyle = "#4a9e4a";
      ctx.fillRect(0, world.groundY + 15, canvas.width, canvas.height - world.groundY);

      for (const fl of world.flowers) {
        ctx.fillStyle = `hsl(${fl.hue}, 85%, 67%)`;
        ctx.beginPath();
        ctx.arc(fl.x, fl.y, 2.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPipePair(pipe) {
      const capH = 14;
      const topH = pipe.gapY - pipe.gapH * 0.5;
      const bottomY = pipe.gapY + pipe.gapH * 0.5;
      const bottomH = world.groundY - bottomY;

      ctx.fillStyle = "#3fb15f";
      ctx.fillRect(pipe.x, 0, pipe.w, topH);
      ctx.fillRect(pipe.x, bottomY, pipe.w, bottomH);

      ctx.fillStyle = "#2f8f4c";
      ctx.fillRect(pipe.x - 4, topH - capH, pipe.w + 8, capH);
      ctx.fillRect(pipe.x - 4, bottomY, pipe.w + 8, capH);

      ctx.strokeStyle = "rgba(0,0,0,0.16)";
      ctx.lineWidth = 2;
      ctx.strokeRect(pipe.x, 0, pipe.w, topH);
      ctx.strokeRect(pipe.x, bottomY, pipe.w, bottomH);
    }

    function drawPlayer() {
      for (let i = 0; i < player.trail.length; i++) {
        const t = player.trail[i];
        const alpha = (i / player.trail.length) * 0.22;
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.beginPath();
        ctx.ellipse(t.x - 4, t.y + 2, 9, 6, 0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      const flutter = Math.sin(performance.now() * 0.03) * 0.14;
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(flutter + clamp(player.vy / 900, -0.32, 0.36));

      if (player.flashTimer > 0) {
        ctx.fillStyle = "rgba(255, 238, 166, 0.85)";
        ctx.beginPath();
        ctx.arc(0, 0, player.radius + 6, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.ellipse(0, 0, 19, 13, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(90,120,150,0.65)";
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(-10, -3);
      ctx.quadraticCurveTo(0, -6, 11, -1);
      ctx.moveTo(-9, 4);
      ctx.quadraticCurveTo(1, 2, 10, 6);
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of world.particles) {
        const alpha = clamp(p.life / 0.32, 0, 1);
        ctx.fillStyle = `hsla(${p.hue}, 90%, 67%, ${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function render() {
      drawBackground();
      for (const pipe of world.pipes) drawPipePair(pipe);
      drawParticles();
      drawPlayer();
    }

    let lastTs = performance.now();
    function tick(ts) {
      const dt = Math.min((ts - lastTs) / 1000, 0.033);
      lastTs = ts;

      if (game.mode === "running") {
        applyInput(dt);
        updatePlayer(dt);
        updateWorld(dt);
        updateParticles(dt);
        resolveCollisions();
        updateHud();
      } else {
        updateParticles(dt);
      }

      render();
      requestAnimationFrame(tick);
    }

    startBtn.addEventListener("click", () => {
      if (game.mode === "menu") startRun();
    });
    motionBtn.addEventListener("click", requestMotionPermission);

    resizeCanvas();
    resetGame();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
